server:
  port: 8082
  servlet:
    context-path: /order-service

app:
  api-gateway-url: http://localhost:8000/api/order-service
  product-service-url: http://product-service

spring:
  application:
    name: order-service
  profiles:
    active: @spring.profiles.active@
  elasticsearch:
    uris: ${ELASTICSEARCH_HOSTS:http://localhost:9200}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true

logging:
  level:
    root: info
    com.iuh: debug
  file:
    name: logs/order-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}:${server.port}] [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}:${server.port}] [%thread] %-5level %logger{36} - %msg%n"