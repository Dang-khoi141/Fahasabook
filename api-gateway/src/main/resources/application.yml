server:
  port: 8000

app:
  api-prefix: /api

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOriginPatterns: "*" # Use allowedOriginPatterns instead of allowedOrigins
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        # Main service routes
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=${app.api-prefix}/user-service/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=${app.api-prefix}/product-service/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 2
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=${app.api-prefix}/order-service/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 3
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=${app.api-prefix}/payment-service/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 4
        - id: email-service
          uri: lb://email-service
          predicates:
            - Path=${app.api-prefix}/email-service/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 5

        # Direct access routes for API documentation
        - id: order-service-api-docs
          uri: http://localhost:8082
          predicates:
            - Path=/order-service/v3/api-docs/**
        - id: product-service-api-docs
          uri: http://localhost:8081
          predicates:
            - Path=/product-service/v3/api-docs/**
        - id: user-service-api-docs
          uri: http://localhost:8080
          predicates:
            - Path=/user-service/v3/api-docs/**
        - id: payment-service-api-docs
          uri: http://localhost:8083
          predicates:
            - Path=/payment-service/v3/api-docs/**
        - id: email-service-api-docs
          uri: http://localhost:8084
          predicates:
            - Path=/email-service/v3/api-docs/**

  cloud.loadbalancer:
    ribbon:
      enabled: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Logging configuration
logging:
  level:
    root: info
    com.iuh: debug
    org.springframework.cloud.gateway: info
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: info
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: debug
  file:
    name: logs/api-gateway.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}] [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}] [%thread] %-5level %logger{36} - %msg%n"

# OpenAPI
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: API Gateway
        url: /v3/api-docs
      - name: User Service
        url: /user-service/v3/api-docs
      - name: Product Service
        url: /product-service/v3/api-docs
      - name: Order Service
        url: /order-service/v3/api-docs
      - name: Payment Service
        url: /payment-service/v3/api-docs
      - name: Email Service
        url: /email-service/v3/api-docs
    config-url: /v3/api-docs/swagger-config
    use-root-path: true

openapi:
  service:
    title: Hafasa API documentation
    version: 1.0.0
    description: API for managing books in a bookstore
    server: http://localhost:${server.port}
