server:
  port: 8083
  servlet:
    context-path: /payment-service

app:
  api-gateway-url: http://localhost:8000/api/payment-service

spring:
  application:
    name: payment-service
  profiles:
    active: @spring.profiles.active@

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true

payos:
  CLIENT_ID: ${PAYOS_CLIENT_ID}
  API_KEY: ${PAYOS_API_KEY}
  CHECKSUM_KEY: ${PAYOS_CHECKSUM_KEY}

logging:
  level:
    root: info
    com.iuh: debug
  file:
    name: logs/payment-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}:${server.port}] [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [${spring.application.name}:${server.port}] [%thread] %-5level %logger{36} - %msg%n"